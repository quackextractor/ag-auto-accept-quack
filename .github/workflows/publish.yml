name: Publish Extension

on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Bump Version
        id: bump_version
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [[ "${{ github.event.head_commit.message }}" != *"[skip ci]"* ]]; then
            npm --no-git-tag-version version patch
            NEW_VERSION=$(node -p "require('./package.json').version")
            sed -i -E "s/badge\/version-[0-9.]+-[a-zA-Z]+\.svg/badge\/version-${NEW_VERSION}-blue.svg/g" README.md
            git add package.json package-lock.json README.md
            git commit -m "Bump version to ${NEW_VERSION} [skip ci]"
            git tag "v${NEW_VERSION}"
            git push origin master --follow-tags
          fi
          echo "NEW_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV
          echo "NEW_TAG=v$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Build VSIX
        run: npx -y @vscode/vsce package

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.NEW_TAG }}
          release_name: Release ${{ env.NEW_TAG }}
          draft: false
          prerelease: false

      - name: Upload VSIX to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./ag-auto-accept-quack-${{ env.NEW_VERSION }}.vsix
          asset_name: ag-auto-accept-quack-${{ env.NEW_VERSION }}.vsix
          asset_content_type: application/octet-stream

      - name: Publish to Open VSX
        run: npx ovsx publish -p ${{ secrets.OVSX_TOKEN }}
